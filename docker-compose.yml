version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aashley
      POSTGRES_PASSWORD: aashley123
      POSTGRES_DB: aashley_school
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aashley -d aashley_school"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://aashley:aashley123@db:5432/aashley_school
      NODE_ENV: production
      PORT: "5000"
      SESSION_SECRET: change-me-to-a-secure-random-string
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
