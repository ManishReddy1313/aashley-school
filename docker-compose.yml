version: "3.8"

services:
  app:
    build: .
    container_name: aashley-school
    restart: unless-stopped
    expose:
      - "5000"
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      PORT: "5000"
      SESSION_SECRET: ${SESSION_SECRET:-change-me-to-a-secure-random-string}
    networks:
      - default
      - nginx-proxy

networks:
  nginx-proxy:
    external: true
    name: nginx-proxy-manager_default
