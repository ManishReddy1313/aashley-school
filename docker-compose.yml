# Loads all variables from .env in this directory into the app container.
# Copy .env.example → .env and fill in values. Do not commit .env.
#
# Run: docker compose up -d --build
#
version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: aashley-school:latest
    container_name: aashley-school
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Overrides / defaults (take precedence over keys in .env if duplicated)
      NODE_ENV: production
      PORT: "5000"
    expose:
      - "5000"
    ports:
      - "5000:5000"
    networks:
      - default
      - nginx-proxy

networks:
  nginx-proxy:
    external: true
    name: proxy_default
